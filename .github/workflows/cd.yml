name: Deploy

on:
  repository_dispatch:
    types: [deploy-app]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      tag:
        description: "Docker image tag (defaults to latest)"
        required: false
        default: "latest"

concurrency:
  group: deploy-${{ github.event.client_payload.environment || inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    timeout-minutes: 25
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.client_payload.environment || inputs.environment }}
      # TAG: prefer dispatched tag, then manual input, then fall back to "latest"
      TAG: ${{ github.event.client_payload.tag || inputs.tag || 'latest' }}
      COMMIT_SHA: ${{ github.event.client_payload.commit_sha || github.sha }}
      TRIGGERED_BY: ${{ github.event.client_payload.triggered_by || github.actor }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_STDOUT_CALLBACK: "yaml"
      ANSIBLE_CALLBACKS_ENABLED: "profile_tasks"
      ANSIBLE_SSH_COMMON_ARGS: >-
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o ServerAliveInterval=15
        -o ServerAliveCountMax=3
        -o ConnectTimeout=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup WireGuard VPN
        run: |
          sudo apt-get update -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y wireguard wireguard-tools resolvconf netcat-openbsd

          echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 5

          TARGET_IP=$([[ "${{ env.ENVIRONMENT }}" == "staging" ]] \
            && echo "${{ secrets.STAGING_SERVER_VPN_IP }}" \
            || echo "${{ secrets.PRODUCTION_SERVER_VPN_IP }}")
          ping -c 2 "${TARGET_IP}"
          nc -vz "${TARGET_IP}" 22 || true

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_VPN_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_VPN_IP }} >> ~/.ssh/known_hosts

      - name: Write Ansible vault password
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.ansible_vault
          chmod 600 ~/.ansible_vault

      - name: Show deploy info
        run: |
          echo "Environment : ${{ env.ENVIRONMENT }}"
          echo "Image tag   : ${{ env.TAG }}"
          echo "Commit      : ${{ env.COMMIT_SHA }}"
          echo "Triggered by: ${{ env.TRIGGERED_BY }}"

      - name: Deploy
        working-directory: ansible
        env:
          ANSIBLE_SSH_COMMON_ARGS: >-
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o HostKeyAlgorithms=ssh-ed25519,ecdsa-sha2-nistp256
            -o PubkeyAcceptedAlgorithms=ssh-ed25519
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=8
            -o ConnectTimeout=30
        run: |
          timeout 1800 ansible-playbook \
            -i inventories/${{ env.ENVIRONMENT }}/hosts.ini \
            playbooks/deploy.yml \
            -e "TAG=${{ env.TAG }}" \
            -e "ansible_user=${{ env.SERVER_USER }}" \
            -T 60 \
            -vv

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ansible_vault
          sudo wg-quick down wg0 || true

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ env.ENVIRONMENT }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ env.TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ env.COMMIT_SHA }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ env.TRIGGERED_BY }} |" >> $GITHUB_STEP_SUMMARY

      - name: Comment on source commit
        if: always() && github.event.client_payload.repo != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_REPO_PAT }}
          script: |
            const [owner, repo] = '${{ github.event.client_payload.repo }}'.split('/');
            const sha = '${{ env.COMMIT_SHA }}';
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';

            await github.rest.repos.createCommitComment({
              owner, repo,
              commit_sha: sha,
              body: `${icon} **Deployment to \`${{ env.ENVIRONMENT }}\` ${status}**\n\n- Tag: \`${{ env.TAG }}\`\n- [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });

name: Build & Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: "22"
  # PNPM_VERSION: "8"
  REGISTRY: ghcr.io/codedsultan/x-socials

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. CI — lint, type-check, test, build
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit


      - name: Lint
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  # 2. Build & push Docker image
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.tags.outputs.deploy_tag }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "deploy_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "app_tags=${{ env.REGISTRY }}:latest,${{ env.REGISTRY }}:${{ github.sha }},${{ env.REGISTRY }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "worker_tags=${{ env.REGISTRY }}-worker:latest,${{ env.REGISTRY }}-worker:${{ github.sha }},${{ env.REGISTRY }}-worker:${SHORT_SHA}" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "deploy_tag=develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "app_tags=${{ env.REGISTRY }}:develop,${{ env.REGISTRY }}:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "worker_tags=${{ env.REGISTRY }}-worker:develop,${{ env.REGISTRY }}-worker:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: app
          push: true
          tags: ${{ steps.tags.outputs.app_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Remove this block if you have no background worker
      # - name: Build and push worker image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: Dockerfile
      #     target: worker
      #     push: true
      #     tags: ${{ steps.tags.outputs.worker_tags }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "## 🐳 x-socials Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ steps.env.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy tag | \`${{ steps.tags.outputs.deploy_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # 3. Trigger Ansible deployment via infra repo dispatch
  # ────────────────────────────────────────────────────────────────
  trigger-deployment:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && needs.build-and-push.outputs.environment != ''

    steps:
      - name: Dispatch to infra repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: codedsultan/x-infra-node
          event-type: deploy-app
          client-payload: |
            {
              "environment": "${{ needs.build-and-push.outputs.environment }}",
              "tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "commit_sha": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}",
              "repo": "${{ github.repository }}",
              "run_id": "${{ github.run_id }}"
            }
